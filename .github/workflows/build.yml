stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: "docker.io"
  IMAGE_NAME: "admin-service-v2"
  DOCKER_IMAGE: ${DOCKER_USERNAME}/${IMAGE_NAME}
  SOLUTION_FILE: "CleanArchitecture.sln"   # Correct solution name

# Build and test .NET application
build-test-dotnet:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  tags:
    - esma
  script:
    - dotnet restore $SOLUTION_FILE
    - dotnet build $SOLUTION_FILE --no-restore -c Release
    - dotnet test $SOLUTION_FILE --no-build -c Release -m:4 --logger "trx;LogFileName=test-results.trx"
  artifacts:
    paths:
      - "**/TestResults/*.trx"   # Capture test results
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

# Build and push Docker image
docker-build-push:
  stage: build
  image: docker:28.0
  services:
    - docker:28.0-dind
  tags:
    - esma
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --use
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
  - |
    docker buildx build \
      --platform linux/arm64 \
      --push \
      -t $DOCKER_IMAGE:latest \
      -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA \
      -f ./src/Web.Api/Dockerfile \
      .
  needs: ["build-test-dotnet"]  # Require tests to pass first
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Auto-deploy to server
deploy-to-server:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "cd ~/server-setup/esma && chmod +x ./restart && ./restart"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      needs: ["docker-build-push"]
  when: on_success

# Manual deployment trigger
manual-deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "cd ~/server-setup/esma && chmod +x ./restart && ./restart"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: false
