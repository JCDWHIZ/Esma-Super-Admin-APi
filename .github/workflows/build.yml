stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: "docker.io"
  IMAGE_NAME: "admin-service-v2"
  DOCKER_IMAGE: ${DOCKER_USERNAME}/${IMAGE_NAME}
  SOLUTION_FILE: "CleanArchitecture.sln"   # Correct solution name

# Build and test .NET application
build-test-dotnet:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  tags:
    - esma
  script:
    - dotnet restore $SOLUTION_FILE
    - dotnet build $SOLUTION_FILE --no-restore -c Release
    - dotnet test $SOLUTION_FILE --no-build -c Release -m:4 --logger "trx;LogFileName=test-results.trx"
  artifacts:
    paths:
      - "**/TestResults/*.trx"   # Capture test results
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

# Build and push Docker image
docker-build-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - esma
  variables:
    DOCKER_IMAGE: ${DOCKER_USERNAME}/${IMAGE_NAME}
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "username": "${DOCKER_USERNAME}",
            "password": "${DOCKER_PASSWORD}"
          }
        }
      }
      EOF
    - |
      /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/src/Web.Api/Dockerfile \
        --destination $DOCKER_IMAGE:latest \
        --destination $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA \
        --cache=true \
        --cache-repo=$DOCKER_IMAGE-cache
  needs: ["build-test-dotnet"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Auto-deploy to server
deploy-to-server:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "cd ~/server-setup/esma && chmod +x ./restart && ./restart"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      needs: ["docker-build-push"]
  when: on_success

# Manual deployment trigger
manual-deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "cd ~/server-setup/esma && chmod +x ./restart && ./restart"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: false
